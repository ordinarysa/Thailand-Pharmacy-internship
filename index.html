<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0D1117" />
  <title>PharmIntern 6°</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>" />
  <!-- React 18 -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <!-- Babel standalone for JSX transform -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; background: #0D1117; min-height: 100vh; }
    #root { min-height: 100vh; }
    /* iOS safe area */
    body { padding-bottom: env(safe-area-inset-bottom); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// React hooks available via window.React

const STORE_KEY = "pharmintern_v2";
const persist = {
  load: () => { try { const r = localStorage.getItem(STORE_KEY); return r ? JSON.parse(r) : null; } catch { return null; } },
  save: (d) => { try { localStorage.setItem(STORE_KEY, JSON.stringify(d)); } catch {} },
};

const todayStr = () => new Date().toISOString().slice(0, 10);

const mkData = () => ({
  settings: { name: "สาธยาย", site: "โรงพยาบาล", startDate: todayStr() },
  entries: {},
  teachers: [],
  questions: [],
  schedule: [],
  guidelines: [],
  papers: [],
  cases: [],
  drugs: [],
  skills: [
    { id:1,  cat:"จ่ายยา",  name:"Dispensing & counseling", done:false },
    { id:2,  cat:"จ่ายยา",  name:"Drug interaction check",  done:false },
    { id:3,  cat:"จ่ายยา",  name:"OTC recommendation",      done:false },
    { id:4,  cat:"คลินิก",  name:"Ward round",              done:false },
    { id:5,  cat:"คลินิก",  name:"Drug therapy monitoring", done:false },
    { id:6,  cat:"คลินิก",  name:"ADR reporting",           done:false },
    { id:7,  cat:"คลินิก",  name:"Patient counseling",      done:false },
    { id:8,  cat:"การผลิต", name:"Compounding (sterile)",   done:false },
    { id:9,  cat:"การผลิต", name:"Compounding (non-sterile)",done:false },
    { id:10, cat:"วิชาการ", name:"Drug information query",  done:false },
    { id:11, cat:"วิชาการ", name:"Journal club",            done:false },
    { id:12, cat:"วิชาการ", name:"Case presentation",       done:false },
  ],
});

const mkEntry = () => ({
  mood: 3,
  site: "hospital",
  scores: { work:5, teacher:5, social:5, skill:5, mental:5, knowledge:5 },
  diary: "", tasks: [], reading: [], feedback: "",
});

const DIMS = [
  { key:"work",      label:"งาน",     icon:"🏥", color:"#34D399" },
  { key:"teacher",   label:"อาจารย์", icon:"👩‍🏫", color:"#60A5FA" },
  { key:"social",    label:"สังคม",   icon:"🤝", color:"#F87171" },
  { key:"skill",     label:"ทักษะ",   icon:"💼", color:"#FBBF24" },
  { key:"mental",    label:"จิตใจ",   icon:"🧠", color:"#A78BFA" },
  { key:"knowledge", label:"ความรู้", icon:"📚", color:"#34D399" },
];

const SITES = [
  { id:"hospital", label:"โรงพยาบาล", icon:"🏥", color:"#34D399", bg:"#052E1C" },
  { id:"pharmacy", label:"ร้านยา",     icon:"💊", color:"#60A5FA", bg:"#0C1A2E" },
  { id:"pharma",   label:"บริษัทยา",  icon:"🏭", color:"#FBBF24", bg:"#2D1F00" },
];

const MOODS  = ["😩","😔","😐","🙂","😊","😄"];
const MLABEL = ["หนักมาก","เหนื่อย","โอเค","ดี","ดีมาก","ยอดเยี่ยม"];
const TIMES  = ["07:00","07:30","08:00","08:30","09:00","09:30","10:00","10:30","11:00","11:30","12:00","12:30","13:00","13:30","14:00","14:30","15:00","15:30","16:00","16:30","17:00"];
const DOWTH  = ["จ.","อ.","พ.","พฤ.","ศ.","ส.","อา."];
const DOWEN  = ["MO","TU","WE","TH","FR","SA","SU"];
const CATCOL = { OPD:"#34D399", Ward:"#60A5FA", "ห้องยา":"#FBBF24", "ประชุม":"#F87171", "อื่นๆ":"#A78BFA" };
const STYPES = ["RCT","Meta-analysis","Systematic review","Cohort","Case-control","Cross-sectional","Case report","Other"];

// ─── ROOT ────────────────────────────────────────────────────────
function App() {
  const [data,       setData]       = useState(() => persist.load() || mkData());
  const [tab,        setTab]        = useState("home");
  const [date,       setDate]       = useState(todayStr);
  const [activeSite, setActiveSite] = useState("all"); // "all" | "hospital" | "pharmacy" | "pharma"

  const update = useCallback((fn) => {
    setData(prev => {
      const next = fn(JSON.parse(JSON.stringify(prev)));
      persist.save(next);
      return next;
    });
  }, []);

  const entry    = data.entries[date] || mkEntry();
  const setEntry = (fn) => update(d => { d.entries[date] = fn(d.entries[date] || mkEntry()); return d; });
  const dayN     = Math.max(1, Math.floor((new Date(todayStr()) - new Date(data.settings.startDate)) / 86400000) + 1);

  const curSite  = SITES.find(s => s.id === activeSite);
  const accentColor = curSite ? curSite.color : "#34D399";

  const TABS = [
    { k:"home",     icon:"🏠", lbl:"หน้าหลัก" },
    { k:"today",    icon:"📅", lbl:"วันนี้"    },
    { k:"schedule", icon:"🗓️",  lbl:"ตาราง"    },
    { k:"teachers", icon:"👩‍🏫", lbl:"อาจารย์"  },
    { k:"guide",    icon:"📋", lbl:"Guideline" },
    { k:"papers",   icon:"📄", lbl:"Papers"    },
    { k:"more",     icon:"⋯",  lbl:"เพิ่มเติม" },
  ];

  // Site picker bar — shown on every tab except home (home has its own)
  const SitePicker = () => (
    <div style={{display:"flex",gap:4,padding:"8px 12px",background:"#090E15",borderBottom:"1px solid #1C2433",overflowX:"auto"}}>
      <button onClick={()=>setActiveSite("all")} style={{
        padding:"5px 12px",borderRadius:99,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit",flexShrink:0,
        border:`1px solid ${activeSite==="all"?"#34D399":"#1C2433"}`,
        background:activeSite==="all"?"#34D39920":"transparent",
        color:activeSite==="all"?"#34D399":"#4B5563"
      }}>🌐 ทั้งหมด</button>
      {SITES.map(s=>(
        <button key={s.id} onClick={()=>setActiveSite(s.id)} style={{
          padding:"5px 12px",borderRadius:99,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit",flexShrink:0,whiteSpace:"nowrap",
          border:`1px solid ${activeSite===s.id?s.color:"#1C2433"}`,
          background:activeSite===s.id?s.bg:"transparent",
          color:activeSite===s.id?s.color:"#4B5563"
        }}>{s.icon} {s.label}</button>
      ))}
    </div>
  );

  return (
    <div style={S.root}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        input,textarea,select{font-family:inherit}
        ::-webkit-scrollbar{width:4px}
        ::-webkit-scrollbar-thumb{background:#1C2433;border-radius:99px}
        input[type=range]{-webkit-appearance:none;height:6px;border-radius:99px;outline:none;cursor:pointer}
        input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid #0D1117}
        @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
        .fi{animation:fi .25s ease}
        .hov:hover{background:#1a2333!important}
        .feat-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px #00000040}
        .feat-btn{transition:transform .18s,box-shadow .18s}
      `}</style>

      {/* ── HEADER (hidden on home) ── */}
      {tab !== "home" && (
        <div style={{...S.hdr, flexDirection:"column", gap:0, padding:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px 8px"}}>
            <div>
              <div style={S.hdrT}>
                PharmIntern <span style={{color: accentColor}}>6°</span>
                {curSite && <span style={{fontSize:13,marginLeft:8}}>{curSite.icon} {curSite.label}</span>}
              </div>
              <div style={S.hdrS}>{data.settings.name} · Day {dayN}</div>
            </div>
            <button onClick={() => setTab("home")} style={{background:"none",border:"none",cursor:"pointer",fontSize:20}}>🏠</button>
          </div>
          <SitePicker />
        </div>
      )}

      {/* ── BODY ── */}
      <div style={S.body}>
        {tab === "home"     && <TabDashboard data={data} dayN={dayN} setTab={setTab} date={date} activeSite={activeSite} setActiveSite={setActiveSite} />}
        {tab === "today"    && <TabToday    entry={entry} setEntry={setEntry} date={date} setDate={setDate} activeSite={activeSite} />}
        {tab === "schedule" && <TabSchedule data={data} update={update} date={date} setDate={setDate} activeSite={activeSite} />}
        {tab === "teachers" && <TabTeachers data={data} update={update} activeSite={activeSite} />}
        {tab === "guide"    && <TabGuide    data={data} update={update} activeSite={activeSite} />}
        {tab === "papers"   && <TabPapers   data={data} update={update} activeSite={activeSite} />}
        {tab === "overview" && <TabOverview data={data} activeSite={activeSite} />}
        {tab === "more"     && <TabMore     data={data} update={update} activeSite={activeSite} />}
      </div>

      {/* ── NAV ── */}
      <div style={S.nav}>
        {TABS.map(t => (
          <button key={t.k} onClick={() => setTab(t.k)}
            style={{ ...S.navBtn, ...(tab === t.k ? {...S.navOn, color: accentColor} : {}) }}>
            <span style={{fontSize:17}}>{t.icon}</span>
            <span style={{fontSize:9,marginTop:1}}>{t.lbl}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

// ─── DASHBOARD (HOME) ────────────────────────────────────────────
function TabDashboard({ data, dayN, setTab, date, activeSite, setActiveSite }) {
  const siteTab    = activeSite;
  const setSiteTab = setActiveSite;

  const allEntries = Object.entries(data.entries);

  // filter entries by site tab
  const entries = siteTab === "all"
    ? allEntries
    : allEntries.filter(([, e]) => (e.site || "hospital") === siteTab);

  const n = entries.length;
  const todayEntry = data.entries[todayStr()] || mkEntry();

  // streak
  let streak = 0;
  const sd = new Date(todayStr());
  while (true) {
    const k = sd.toISOString().slice(0,10);
    if (!data.entries[k]) break;
    streak++; sd.setDate(sd.getDate()-1);
  }

  // stats for filtered entries
  const tasksDone  = entries.reduce((s,[,e]) => s + e.tasks.filter(t=>t.done).length, 0);
  const tasksTotal = entries.reduce((s,[,e]) => s + e.tasks.length, 0);
  const avgScore   = n ? (entries.reduce((s,[,e]) => s + Object.values(e.scores).reduce((a,b)=>a+b,0)/6, 0)/n).toFixed(1) : null;
  const avgMood    = n ? (entries.reduce((s,[,e]) => s+(e.mood||0), 0)/n).toFixed(1) : null;

  // per-site entry counts
  const siteCounts = SITES.map(s => ({
    ...s,
    count: allEntries.filter(([,e]) => (e.site||"hospital") === s.id).length,
    avgScore: (() => {
      const se = allEntries.filter(([,e]) => (e.site||"hospital") === s.id);
      return se.length ? (se.reduce((a,[,e]) => a + Object.values(e.scores).reduce((x,y)=>x+y,0)/6, 0)/se.length).toFixed(1) : null;
    })(),
  }));

  // skills
  const skillDone  = data.skills.filter(s => s.done).length;
  const skillTotal = data.skills.length;
  const skillPct   = Math.round(skillDone/skillTotal*100)||0;

  // Q&A
  const totalQs    = data.questions.length;
  const acceptedQs = data.questions.filter(q => q.status==="accepted").length;
  const globalSR   = totalQs > 0 ? Math.round(acceptedQs/totalQs*100) : null;

  // today schedule
  const selDow = DOWEN[(new Date(todayStr()).getDay()+6)%7];
  const todaySchedule = data.schedule.filter(s =>
    s.repeat==="daily" ||
    (s.repeat==="weekly" && s.days && s.days.includes(selDow)) ||
    (s.repeat==="once" && s.date===todayStr())
  ).sort((a,b)=>a.startTime.localeCompare(b.startTime)).slice(0,3);

  const pendingTasks = todayEntry.tasks.filter(t=>!t.done).slice(0,3);

  // last 7 mood (filtered)
  const last7 = Array.from({length:7}).map((_,i)=>{
    const dd = new Date(todayStr()); dd.setDate(dd.getDate()-6+i);
    const k  = dd.toISOString().slice(0,10);
    const e  = data.entries[k];
    const show = e && (siteTab==="all" || (e.site||"hospital")===siteTab);
    return { k, mood: show ? e.mood : null, site: e?.site, day: DOWTH[(dd.getDay()+6)%7] };
  });

  const curSite = SITES.find(s=>s.id===siteTab);

  const FEATURES = [
    { k:"today",    icon:"📅", label:"บันทึกวันนี้",    desc:"Mood · คะแนน · ไดอารี่",                                    color:"#34D399", bg:"#052E1C" },
    { k:"schedule", icon:"🗓️",  label:"ตารางงาน",        desc:`${todaySchedule.length} กิจกรรมวันนี้`,                       color:"#60A5FA", bg:"#0C1A2E" },
    { k:"teachers", icon:"👩‍🏫", label:"อาจารย์ & Q&A",   desc:`${data.teachers.length} อาจารย์${globalSR!==null?" · "+globalSR+"% ✓":""}`, color:"#F87171", bg:"#2D0A0A" },
    { k:"guide",    icon:"📋", label:"Guideline",        desc:`${data.guidelines.length} โรค`,                              color:"#FBBF24", bg:"#2D1F00" },
    { k:"papers",   icon:"📄", label:"Paper Review",     desc:`${data.papers.length} papers`,                               color:"#A78BFA", bg:"#1A0D2E" },
    { k:"more",     icon:"⋯",  label:"Cases / ยา / Skills", desc:`${data.cases.length} cases · ${data.drugs.length} ยา`,    color:"#6EE7B7", bg:"#042018" },
  ];

  return (
    <div style={{background:"#0D1117", minHeight:"100vh", paddingBottom:90}}>

      {/* ── HERO ── */}
      <div style={{
        background: siteTab==="all"
          ? "linear-gradient(160deg,#0a1628 0%,#0D1117 60%)"
          : `linear-gradient(160deg,${curSite.bg} 0%,#0D1117 55%)`,
        padding:"32px 20px 24px",
        borderBottom:"1px solid #1C2433",
        position:"relative", overflow:"hidden"
      }}>
        <div style={{position:"absolute",top:-60,right:-60,width:220,height:220,
          background:`radial-gradient(circle,${siteTab==="all"?"#34D39918":curSite.color+"18"} 0%,transparent 70%)`,pointerEvents:"none"}}/>

        <div style={{position:"relative"}}>
          <div style={{fontSize:11,color:siteTab==="all"?"#34D399":curSite.color,fontFamily:"IBM Plex Mono",fontWeight:600,letterSpacing:2,marginBottom:6,textTransform:"uppercase"}}>
            Pharmacy Internship
          </div>
          <div style={{fontSize:24,fontWeight:700,color:"#F3F4F6",lineHeight:1.2,marginBottom:4}}>
            สวัสดี {data.settings.name} 👋
          </div>
          <div style={{fontSize:13,color:"#4B5563",marginBottom:20}}>{fmtTH(todayStr())}</div>

          {/* hero counters */}
          <div style={{display:"flex",gap:10}}>
            <div style={{background:"#161D27",border:"1px solid #1C2433",borderRadius:14,padding:"12px 0",flex:1,textAlign:"center"}}>
              <div style={{fontSize:26,fontWeight:700,color:"#34D399",fontFamily:"IBM Plex Mono",lineHeight:1}}>{dayN}</div>
              <div style={{fontSize:10,color:"#4B5563",marginTop:3}}>วันที่ฝึก</div>
            </div>
            <div style={{background:"#161D27",border:"1px solid #1C2433",borderRadius:14,padding:"12px 0",flex:1,textAlign:"center"}}>
              <div style={{fontSize:26,fontWeight:700,color:"#FBBF24",fontFamily:"IBM Plex Mono",lineHeight:1}}>{streak}</div>
              <div style={{fontSize:10,color:"#4B5563",marginTop:3}}>🔥 Streak</div>
            </div>
            <div style={{background:"#161D27",border:"1px solid #1C2433",borderRadius:14,padding:"12px 0",flex:1,textAlign:"center"}}>
              <div style={{fontSize:26,fontWeight:700,color:"#60A5FA",fontFamily:"IBM Plex Mono",lineHeight:1}}>{skillPct}%</div>
              <div style={{fontSize:10,color:"#4B5563",marginTop:3}}>Skills</div>
            </div>
          </div>
        </div>
      </div>

      <div style={{padding:"14px 14px 0"}}>

        {/* ── SITE TABS ── */}
        <div style={{display:"flex",gap:6,marginBottom:16,overflowX:"auto",paddingBottom:2}}>
          <button onClick={() => setSiteTab("all")}
            style={{
              padding:"8px 14px", borderRadius:99, fontSize:12, fontWeight:600,
              cursor:"pointer", fontFamily:"inherit", flexShrink:0, whiteSpace:"nowrap",
              border:`1px solid ${siteTab==="all"?"#34D399":"#1C2433"}`,
              background: siteTab==="all" ? "#34D39920" : "transparent",
              color: siteTab==="all" ? "#34D399" : "#4B5563"
            }}>
            🌐 ทั้งหมด <span style={{fontFamily:"IBM Plex Mono",fontSize:11}}>({allEntries.length})</span>
          </button>
          {SITES.map(s => (
            <button key={s.id} onClick={() => setSiteTab(s.id)}
              style={{
                padding:"8px 14px", borderRadius:99, fontSize:12, fontWeight:600,
                cursor:"pointer", fontFamily:"inherit", flexShrink:0, whiteSpace:"nowrap",
                border:`1px solid ${siteTab===s.id ? s.color : "#1C2433"}`,
                background: siteTab===s.id ? s.bg : "transparent",
                color: siteTab===s.id ? s.color : "#4B5563"
              }}>
              {s.icon} {s.label} <span style={{fontFamily:"IBM Plex Mono",fontSize:11}}>({allEntries.filter(([,e])=>(e.site||"hospital")===s.id).length})</span>
            </button>
          ))}
        </div>

        {/* ── PER-SITE SUMMARY (when not "all") ── */}
        {siteTab !== "all" && curSite && (
          <div style={{...DS.card, marginBottom:14, border:`1px solid ${curSite.color}30`}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
              <div style={{fontSize:28}}>{curSite.icon}</div>
              <div>
                <div style={{fontSize:15,fontWeight:700,color:curSite.color}}>{curSite.label}</div>
                <div style={{fontSize:12,color:"#4B5563"}}>{n} วันที่บันทึก</div>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              <div style={{textAlign:"center",background:curSite.bg,borderRadius:10,padding:"10px 4px"}}>
                <div style={{fontSize:18,fontWeight:700,color:curSite.color,fontFamily:"IBM Plex Mono"}}>{n}</div>
                <div style={{fontSize:10,color:"#4B5563",marginTop:2}}>วัน</div>
              </div>
              <div style={{textAlign:"center",background:curSite.bg,borderRadius:10,padding:"10px 4px"}}>
                <div style={{fontSize:18,fontWeight:700,color:curSite.color,fontFamily:"IBM Plex Mono"}}>{avgScore||"—"}</div>
                <div style={{fontSize:10,color:"#4B5563",marginTop:2}}>avg score</div>
              </div>
              <div style={{textAlign:"center",background:curSite.bg,borderRadius:10,padding:"10px 4px"}}>
                <div style={{fontSize:18,fontWeight:700,color:curSite.color,fontFamily:"IBM Plex Mono"}}>{avgMood||"—"}</div>
                <div style={{fontSize:10,color:"#4B5563",marginTop:2}}>avg mood</div>
              </div>
            </div>
          </div>
        )}

        {/* ── ALL-SITE CARDS (when "all") ── */}
        {siteTab === "all" && (
          <div style={{display:"flex",gap:8,marginBottom:14,overflowX:"auto",paddingBottom:2}}>
            {siteCounts.map(s => (
              <button key={s.id} onClick={() => setSiteTab(s.id)}
                style={{
                  flexShrink:0, minWidth:110, background:s.bg, border:`1px solid ${s.color}30`,
                  borderRadius:14, padding:"12px 10px", textAlign:"center", cursor:"pointer", fontFamily:"inherit"
                }}>
                <div style={{fontSize:22}}>{s.icon}</div>
                <div style={{fontSize:20,fontWeight:700,color:s.color,fontFamily:"IBM Plex Mono",lineHeight:1.2,marginTop:4}}>{s.count}</div>
                <div style={{fontSize:10,color:"#4B5563",marginTop:2}}>{s.label}</div>
                {s.avgScore && <div style={{fontSize:10,color:s.color,marginTop:3,fontFamily:"IBM Plex Mono"}}>avg {s.avgScore}</div>}
              </button>
            ))}
          </div>
        )}

        {/* ── MOOD STRIP 7 วัน ── */}
        <div style={{...DS.card, marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:700}}>🌡️ Mood 7 วัน {siteTab!=="all"&&curSite&&<span style={{color:curSite.color}}>· {curSite.label}</span>}</div>
            {avgScore && <div style={{fontSize:12,color:"#4B5563",fontFamily:"IBM Plex Mono"}}>avg {avgScore}/10</div>}
          </div>
          <div style={{display:"flex",gap:4}}>
            {last7.map(({k,mood,site,day}) => {
              const dotSite = SITES.find(s=>s.id===(site||"hospital"));
              return (
                <div key={k} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                  <div style={{
                    width:"100%", height:36, borderRadius:8, display:"flex", alignItems:"center", justifyContent:"center",

// ─── TODAY ───────────────────────────────────────────────────────
function TabToday({ entry, setEntry, date, setDate, activeSite }) {
  const [newTask, setNewTask] = useState("");
  const [newRead, setNewRead] = useState("");

  // sync entry site with activeSite when it's not "all"
  useEffect(() => {
    if (activeSite !== "all" && entry.site !== activeSite) {
      setEntry(e => ({...e, site: activeSite}));
    }
  }, [activeSite]);

  const avg = (Object.values(entry.scores).reduce((a, b) => a + b, 0) / 6).toFixed(1);
  const shift = (n) => {
    const d = new Date(date); d.setDate(d.getDate() + n);
    const s = d.toISOString().slice(0, 10);
    if (s <= todayStr()) setDate(s);
  };

  const addTask = () => {
    if (!newTask.trim()) return;
    setEntry(e => ({ ...e, tasks: [...e.tasks, { text: newTask.trim(), done: false, id: Date.now() }] }));
    setNewTask("");
  };
  const addRead = () => {
    if (!newRead.trim()) return;
    setEntry(e => ({ ...e, reading: [...e.reading, { text: newRead.trim(), id: Date.now() }] }));
    setNewRead("");
  };
  const curSite = SITES.find(s => s.id === (entry.site || "hospital"));

  return (
    <div style={S.tab} className="fi">
      {/* date nav */}
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        <Btn onClick={() => shift(-1)} sx={S.arrBtn}>‹</Btn>
        <input type="date" value={date} max={todayStr()} onChange={e => setDate(e.target.value)} style={{...S.inp,flex:1}} />
        <Btn onClick={() => shift(1)} sx={S.arrBtn}>›</Btn>
      </div>

      {/* site indicator / selector */}
      <div style={{marginBottom:14}}>
        {activeSite !== "all" ? (
          // locked to activeSite — show badge
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",borderRadius:10,
            background:curSite?.bg||"#052E1C",border:`1px solid ${curSite?.color||"#34D399"}40`}}>
            <span style={{fontSize:20}}>{curSite?.icon}</span>
            <div>
              <div style={{fontSize:12,fontWeight:700,color:curSite?.color||"#34D399"}}>{curSite?.label}</div>
              <div style={{fontSize:10,color:"#4B5563"}}>เปลี่ยนได้ที่ปุ่มด้านบน</div>
            </div>
          </div>
        ) : (
          // free choice
          <div style={{display:"flex",gap:6}}>
            {SITES.map(s => (
              <button key={s.id} onClick={() => setEntry(e => ({...e, site: s.id}))}
                style={{
                  flex:1, padding:"8px 4px", borderRadius:10, cursor:"pointer", fontFamily:"inherit",
                  border:`1px solid ${(entry.site||"hospital")===s.id ? s.color : "#1C2433"}`,
                  background:(entry.site||"hospital")===s.id ? s.bg : "transparent",
                  color:(entry.site||"hospital")===s.id ? s.color : "#4B5563",
                  fontSize:11, fontWeight:600, display:"flex", flexDirection:"column",
                  alignItems:"center", gap:3, transition:"all .15s"
                }}>
                <span style={{fontSize:18}}>{s.icon}</span>
                <span>{s.label}</span>
              </button>
            ))}
          </div>
        )}
      </div>

      {/* mood */}
      <Card title="🌡️ อารมณ์">
        <div style={{display:"flex",justifyContent:"space-between"}}>
          {MOODS.map((m, i) => (
            <button key={i} onClick={() => setEntry(e => ({ ...e, mood: i }))}
              style={{ background:"none", border:"none", cursor:"pointer",
                fontSize: entry.mood === i ? 30 : 20,
                transform: entry.mood === i ? "scale(1.3)" : "scale(1)",
                transition:"all .15s" }}>
              {m}
            </button>
          ))}
        </div>
        <div style={{textAlign:"center",color:"#4B5563",fontSize:12,marginTop:6}}>{MLABEL[entry.mood]}</div>
      </Card>

      {/* scores */}
      <Card title={`📊 คะแนนวันนี้ — เฉลี่ย ${avg}/10`}>
        {DIMS.map(d => (
          <div key={d.key} style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:3}}>
              <span>{d.icon} {d.label}</span>
              <span style={{fontFamily:"IBM Plex Mono",fontWeight:700,color:d.color}}>{entry.scores[d.key]}</span>
            </div>
            <input type="range" min={1} max={10} value={entry.scores[d.key]}
              onChange={e => setEntry(en => ({ ...en, scores: { ...en.scores, [d.key]: +e.target.value } }))}
              style={{ width:"100%", background:`linear-gradient(90deg,${d.color} ${entry.scores[d.key]*10}%,#1C2433 ${entry.scores[d.key]*10}%)` }} />
          </div>
        ))}
      </Card>

      {/* tasks */}
      <Card title="✅ งานวันนี้">
        <InRow value={newTask} onChange={setNewTask} ph="เพิ่มงาน… (Enter)" onAdd={addTask} />
        {entry.tasks.length === 0 && <Muted>ยังไม่มีงาน</Muted>}
        {entry.tasks.map(t => (
          <div key={t.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}>
            <input type="checkbox" checked={t.done}
              onChange={() => setEntry(e => ({ ...e, tasks: e.tasks.map(x => x.id===t.id ? {...x,done:!x.done} : x) }))}
              style={{width:16,height:16,accentColor:"#34D399",flexShrink:0}} />
            <span style={{flex:1,fontSize:14,color:t.done?"#374151":"#F3F4F6",textDecoration:t.done?"line-through":"none"}}>{t.text}</span>
            <XBtn onClick={() => setEntry(e => ({ ...e, tasks: e.tasks.filter(x => x.id!==t.id) }))} />
          </div>
        ))}
        {entry.tasks.length > 0 && (
          <div style={{fontSize:11,color:"#374151",marginTop:4}}>
            {entry.tasks.filter(t=>t.done).length}/{entry.tasks.length} เสร็จ
          </div>
        )}
      </Card>

      {/* reading */}
      <Card title="📚 เรียนรู้วันนี้">
        <InRow value={newRead} onChange={setNewRead} ph="สิ่งที่เรียนรู้…" onAdd={addRead} />
        {entry.reading.length === 0 && <Muted>ยังไม่มี</Muted>}
        {entry.reading.map(r => (
          <div key={r.id} style={{display:"flex",gap:8,marginBottom:6}}>
            <span style={{color:"#34D399",marginTop:1,flexShrink:0}}>▸</span>
            <span style={{flex:1,fontSize:14}}>{r.text}</span>
            <XBtn onClick={() => setEntry(e => ({ ...e, reading: e.reading.filter(x => x.id!==r.id) }))} />
          </div>
        ))}
      </Card>

      <Card title="👩‍🏫 Feedback อาจารย์">
        <textarea value={entry.feedback}
          onChange={e => setEntry(en => ({ ...en, feedback: e.target.value }))}
          placeholder="อาจารย์บอกว่า…"
          style={{...S.inp, height:70, resize:"vertical"}} />
      </Card>

      <Card title="📔 ไดอารี่">
        <textarea value={entry.diary}
          onChange={e => setEntry(en => ({ ...en, diary: e.target.value }))}
          placeholder="วันนี้เป็นยังไงบ้าง…"
          style={{...S.inp, height:120, resize:"vertical"}} />
      </Card>
    </div>
  );
}

// ─── SCHEDULE ────────────────────────────────────────────────────
function TabSchedule({ data, update, date, setDate, activeSite }) {
  const [form, setForm] = useState(null);
  const selDow = DOWEN[(new Date(date).getDay() + 6) % 7];

  const items = data.schedule.filter(s => {
    const siteMatch = activeSite === "all" || (s.site || "hospital") === activeSite;
    const dateMatch = s.repeat==="daily" ||
      (s.repeat==="weekly" && s.days && s.days.includes(selDow)) ||
      (s.repeat==="once" && s.date===date);
    return siteMatch && dateMatch;
  }).sort((a,b) => a.startTime.localeCompare(b.startTime));

  const curSite = SITES.find(s => s.id === activeSite);

  const saveItem = (item) => {
    // attach site to schedule item
    const withSite = { ...item, site: activeSite !== "all" ? activeSite : (item.site || "hospital") };
    update(d => {
      if (withSite.id) d.schedule = d.schedule.map(x => x.id===withSite.id ? withSite : x);
      else d.schedule.push({ ...withSite, id: Date.now() });
      return d;
    });
    setForm(null);
  };

  const shiftDate = (n) => {
    const d = new Date(date); d.setDate(d.getDate() + n);
    setDate(d.toISOString().slice(0,10));
  };

  return (
    <div style={S.tab} className="fi">
      {curSite && <SiteBanner site={curSite} />}
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        <Btn onClick={() => shiftDate(-1)} sx={S.arrBtn}>‹</Btn>
        <input type="date" value={date} onChange={e => setDate(e.target.value)} style={{...S.inp,flex:1}} />
        <Btn onClick={() => shiftDate(1)} sx={S.arrBtn}>›</Btn>
      </div>

      <Btn onClick={() => setForm({ startTime:"08:00", endTime:"09:00", title:"", cat:"OPD", repeat:"weekly", days:[selDow], date, note:"" })}
        sx={S.primBtn}>+ เพิ่มกิจกรรม</Btn>

      {form && (
        <Card title={form.id ? "✏️ แก้ไข" : "➕ เพิ่มกิจกรรม"}>
          <FL label="ชื่อกิจกรรม">
            <input value={form.title} onChange={e => setForm(f => ({...f,title:e.target.value}))} placeholder="เช่น OPD Pharmacy" style={S.inp} />
          </FL>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
            <FL label="เริ่ม">
              <select value={form.startTime} onChange={e => setForm(f => ({...f,startTime:e.target.value}))} style={S.inp}>
                {TIMES.map(t => <option key={t}>{t}</option>)}
              </select>
            </FL>
            <FL label="สิ้นสุด">
              <select value={form.endTime} onChange={e => setForm(f => ({...f,endTime:e.target.value}))} style={S.inp}>
                {TIMES.map(t => <option key={t}>{t}</option>)}
              </select>
            </FL>
          </div>
          <FL label="ประเภท">
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {Object.keys(CATCOL).map(c => (
                <Chip key={c} on={form.cat===c} color={CATCOL[c]} onClick={() => setForm(f => ({...f,cat:c}))}>{c}</Chip>
              ))}
            </div>
          </FL>
          <FL label="ความถี่">
            <div style={{display:"flex",gap:6}}>
              {[["once","ครั้งเดียว"],["weekly","รายสัปดาห์"],["daily","ทุกวัน"]].map(([v,l]) => (
                <Chip key={v} on={form.repeat===v} onClick={() => setForm(f => ({...f,repeat:v}))}>{l}</Chip>
              ))}
            </div>
          </FL>
          {form.repeat === "weekly" && (
            <FL label="วัน">
              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                {DOWEN.map((d,i) => (
                  <Chip key={d} on={form.days && form.days.includes(d)}
                    onClick={() => setForm(f => ({
                      ...f,
                      days: f.days && f.days.includes(d) ? f.days.filter(x=>x!==d) : [...(f.days||[]), d]
                    }))}>
                    {DOWTH[i]}
                  </Chip>
                ))}
              </div>
            </FL>
          )}
          {form.repeat === "once" && (
            <FL label="วันที่">
              <input type="date" value={form.date} onChange={e => setForm(f => ({...f,date:e.target.value}))} style={S.inp} />
            </FL>
          )}
          <FL label="หมายเหตุ">
            <input value={form.note} onChange={e => setForm(f => ({...f,note:e.target.value}))} placeholder="เพิ่มเติม" style={S.inp} />
          </FL>
          <Row2>
            <Btn onClick={() => saveItem(form)} sx={{...S.primBtn,flex:1,marginBottom:0}}>บันทึก</Btn>
            <Btn onClick={() => setForm(null)}  sx={{...S.ghostBtn,flex:1}}>ยกเลิก</Btn>
          </Row2>
        </Card>
      )}

      {items.length === 0 && <Muted>ไม่มีกิจกรรมวันนี้</Muted>}
      {items.map(item => (
        <div key={item.id} className="hov" style={{...S.card,display:"flex",gap:12,cursor:"pointer"}} onClick={() => setForm({...item})}>
          <div style={{width:4,borderRadius:99,background:CATCOL[item.cat]||"#6B7280",flexShrink:0,minHeight:40}} />
          <div style={{flex:1}}>
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <span style={{fontWeight:600,fontSize:14}}>{item.title}</span>
              <span style={{fontFamily:"IBM Plex Mono",fontSize:12,color:"#4B5563"}}>{item.startTime}–{item.endTime}</span>
            </div>
            <div style={{display:"flex",gap:6,marginTop:5}}>
              <Badge style={{background:(CATCOL[item.cat]||"#6B7280")+"22",color:CATCOL[item.cat]||"#6B7280"}}>{item.cat}</Badge>
              {item.note && <span style={{fontSize:11,color:"#4B5563"}}>{item.note}</span>}
            </div>
          </div>
          <button onClick={e => { e.stopPropagation(); update(d => { d.schedule=d.schedule.filter(x=>x.id!==item.id); return d; }); }}
            style={{background:"none",border:"none",color:"#374151",cursor:"pointer",fontSize:18,padding:"0 4px",alignSelf:"flex-start"}}>×</button>
        </div>
      ))}
    </div>
  );
}

// ─── TEACHERS ────────────────────────────────────────────────────
function TabTeachers({ data, update, activeSite }) {
  const [selT,  setSelT]  = useState(null);
  const [tForm, setTForm] = useState(null);
  const [qForm, setQForm] = useState(null);

  const curSite = SITES.find(s => s.id === activeSite);
  const teachers = activeSite === "all"
    ? data.teachers
    : data.teachers.filter(t => (t.site || "hospital") === activeSite);
  const teacher  = data.teachers.find(t => t.id === selT);
  const myQs    = data.questions.filter(q => q.teacherId === selT);
  const accepted = myQs.filter(q => q.status === "accepted").length;
  const answered  = myQs.filter(q => q.myAnswer && q.myAnswer.trim()).length;
  const sr = myQs.length > 0 ? Math.round(accepted / myQs.length * 100) : null;

  const saveQ = (q) => {
    update(d => {
      if (q.id) d.questions = d.questions.map(x => x.id===q.id ? q : x);
      else d.questions.push({ ...q, id: Date.now() });
      return d;
    });
    setQForm(null);
  };

  if (selT && teacher) {
    return (
      <div style={S.tab} className="fi">
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
          <Btn onClick={() => { setSelT(null); setQForm(null); }} sx={S.arrBtn}>‹</Btn>
          <div>
            <div style={{fontWeight:700,fontSize:16}}>{teacher.name}</div>
            <div style={{fontSize:12,color:"#4B5563"}}>{teacher.dept} · {teacher.role}</div>
          </div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
          <MStat icon="❓" label="คำถาม"   val={myQs.length} />
          <MStat icon="✍️" label="ตอบแล้ว" val={answered} />
          <MStat icon="✅" label="Accept"  val={accepted} color="#34D399" />
        </div>

        {sr !== null && (
          <div style={{marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}>
              <span>Success rate</span>
              <span style={{color:"#34D399",fontFamily:"IBM Plex Mono",fontWeight:700}}>{sr}%</span>

// ─── OVERVIEW ────────────────────────────────────────────────────
function TabOverview({ data, activeSite }) {
  const allEntries = Object.entries(data.entries).sort(([a],[b]) => a > b ? 1 : -1);
  const entries = activeSite === "all" ? allEntries : allEntries.filter(([,e])=>(e.site||"hospital")===activeSite);
  const curSite = SITES.find(s => s.id === activeSite);
  const last14  = entries.slice(-14);
  const n = entries.length;

  const moodAvg  = n ? (entries.reduce((s,[,e]) => s + e.mood, 0) / n).toFixed(1) : "-";
  const scoreAvg = n ? (entries.reduce((s,[,e]) => s + Object.values(e.scores).reduce((a,b)=>a+b,0)/6, 0) / n).toFixed(1) : "-";
  const tasksDone  = entries.reduce((s,[,e]) => s + e.tasks.filter(t=>t.done).length, 0);
  const tasksTotal = entries.reduce((s,[,e]) => s + e.tasks.length, 0);
  const readTotal  = entries.reduce((s,[,e]) => s + e.reading.length, 0);
  const totalQs    = data.questions.length;
  const acceptedQs = data.questions.filter(q => q.status==="accepted").length;
  const globalSR   = totalQs > 0 ? Math.round(acceptedQs / totalQs * 100) : null;

  const casesF     = activeSite==="all" ? data.cases     : data.cases.filter(c=>(c.site||"hospital")===activeSite);
  const drugsF     = activeSite==="all" ? data.drugs     : data.drugs.filter(d=>(d.site||"hospital")===activeSite);
  const guidelinesF= activeSite==="all" ? data.guidelines: data.guidelines.filter(g=>(g.site||"hospital")===activeSite);
  const papersF    = activeSite==="all" ? data.papers    : data.papers.filter(p=>(p.site||"hospital")===activeSite);
  const qsF        = activeSite==="all" ? data.questions : data.questions.filter(q=>{
    const t=data.teachers.find(t=>t.id===q.teacherId);
    return (t?.site||"hospital")===activeSite;
  });
  const acceptedQsF= qsF.filter(q=>q.status==="accepted").length;
  const globalSRF  = qsF.length>0?Math.round(acceptedQsF/qsF.length*100):null;

  return (
    <div style={S.tab} className="fi">
      {curSite && <SiteBanner site={curSite} />}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
        <MStat icon="📅" label="วันที่บันทึก" val={`${n} วัน`} />
        <MStat icon="😊" label="Mood เฉลี่ย"  val={`${moodAvg}/5`} />
        <MStat icon="⭐" label="คะแนนเฉลี่ย"  val={`${scoreAvg}/10`} />
        <MStat icon="✅" label="งานเสร็จ"     val={`${tasksDone}/${tasksTotal}`} />
        <MStat icon="📚" label="สิ่งที่เรียน"  val={readTotal} />
        <MStat icon="🩺" label="Cases"         val={casesF.length} />
        <MStat icon="💊" label="ยา"            val={drugsF.length} />
        <MStat icon="📋" label="Guidelines"    val={guidelinesF.length} />
        <MStat icon="📄" label="Papers"        val={papersF.length} />
        {globalSRF !== null && <MStat icon="🎯" label="Q&A Success" val={`${globalSRF}%`} color="#34D399" />}
      </div>

      {n > 0 && (
        <Card title="📊 คะแนนเฉลี่ยแต่ละมิติ">
          {DIMS.map(d => {
            const avg = entries.reduce((s,[,e]) => s + (e.scores[d.key]||5), 0) / n;
            return (
              <div key={d.key} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:3}}>
                  <span>{d.icon} {d.label}</span>
                  <span style={{fontFamily:"IBM Plex Mono",fontWeight:700,color:d.color}}>{avg.toFixed(1)}</span>
                </div>
                <div style={{background:"#1C2433",borderRadius:99,height:8,overflow:"hidden"}}>
                  <div style={{width:`${avg*10}%`,height:"100%",background:d.color,borderRadius:99,transition:"width .5s"}} />
                </div>
              </div>
            );
          })}
        </Card>
      )}

      {last14.length > 0 && (
        <Card title="🌡️ Mood 14 วันล่าสุด">
          <div style={{display:"flex",alignItems:"flex-end",gap:3,height:70}}>

                <span style={{fontSize:8,color:"#374151",writingMode:"vertical-rl",transform:"rotate(180deg)"}}>{dt.slice(5)}</span>

      <Card title="✅ Skills Progress">
        <div style={{fontSize:13,color:"#4B5563",marginBottom:8}}>
          {data.skills.filter(s=>s.done).length}/{data.skills.length} ผ่านแล้ว

        <div style={{background:"#1C2433",borderRadius:99,height:10,overflow:"hidden"}}>
          <div style={{

const CONF = [
  { val:0, label:"ยังไม่ผ่าน", color:"#374151", bg:"#1C2433"  },
  { val:1, label:"พอรู้",       color:"#FBBF24", bg:"#FBBF2420" },
  { val:2, label:"ทำได้",       color:"#F97316", bg:"#F9731620" },
  { val:3, label:"ชำนาญ",      color:"#34D399", bg:"#34D39920" },
];
const RUBRIC = [
  { val:1, label:"1 – ต้องช่วยมาก",     color:"#F87171" },
  { val:2, label:"2 – ต้องช่วยบ้าง",    color:"#FBBF24" },
  { val:3, label:"3 – ทำได้เองส่วนใหญ่",color:"#60A5FA" },
  { val:4, label:"4 – ทำได้อิสระ",      color:"#34D399" },
];

function SkillCard({ s, update }) {
  const [open, setOpen] = useState(false);
  const conf = CONF[s.confidence ?? 0];

  const upd = (patch) => update(d => {
    const x = d.skills.find(x => x.id === s.id);
    if (x) Object.assign(x, patch);
    return d;
  });

  const toggleDone = () => {
    const nowDone = !s.done;
    upd({ done: nowDone, doneDate: nowDone ? todayStr() : null });
  };

  const addEvidence = () => {
    upd({ evidenceCount: (s.evidenceCount || 0) + 1, lastEvidence: todayStr() });
  };

  return (
    <div style={{ marginBottom:10, background:"#0D1117", borderRadius:12, border:`1px solid ${s.done ? "#34D39940" : "#1C2433"}`, overflow:"hidden" }}>
      {/* main row */}
      <div style={{ display:"flex", alignItems:"center", gap:10, padding:"12px 12px 10px" }}>
        <input type="checkbox" checked={!!s.done} onChange={toggleDone}
          style={{ width:18, height:18, accentColor:"#34D399", flexShrink:0, cursor:"pointer" }} />
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:14, fontWeight:600, color: s.done ? "#34D399" : "#F3F4F6",
            textDecoration: s.done ? "line-through" : "none", lineHeight:1.3 }}>{s.name}</div>
          {s.doneDate && (
            <div style={{ fontSize:10, color:"#4B5563", marginTop:2 }}>ผ่านเมื่อ {fmtTHshort(s.doneDate)}</div>
          )}
        </div>
        {/* confidence pill */}
        <span style={{ fontSize:10, padding:"3px 8px", borderRadius:99, background: conf.bg, color: conf.color,
          fontWeight:600, flexShrink:0, whiteSpace:"nowrap" }}>
          {conf.label}
        </span>
        {/* expand */}
        <button onClick={() => setOpen(o => !o)}
          style={{ background:"none", border:"none", color:"#4B5563", cursor:"pointer", fontSize:16, padding:"0 2px", flexShrink:0 }}>
          {open ? "▲" : "▼"}
        </button>
      </div>

      {/* evidence bar */}
      {(s.evidenceCount || 0) > 0 && (
        <div style={{ padding:"0 12px 8px", display:"flex", alignItems:"center", gap:8 }}>
          <div style={{ display:"flex", gap:3 }}>
            {Array.from({ length: Math.min(s.evidenceCount, 10) }).map((_, i) => (
              <div key={i} style={{ width:8, height:8, borderRadius:99, background:"#60A5FA" }} />
            ))}
            {s.evidenceCount > 10 && <span style={{ fontSize:10, color:"#4B5563" }}>+{s.evidenceCount - 10}</span>}
          </div>
          <span style={{ fontSize:11, color:"#4B5563" }}>{s.evidenceCount} ครั้ง</span>
          {s.lastEvidence && <span style={{ fontSize:10, color:"#374151" }}>ล่าสุด {fmtTHshort(s.lastEvidence)}</span>}
        </div>
      )}

      {/* expanded panel */}
      {open && (
        <div style={{ padding:"0 12px 12px", borderTop:"1px solid #1C2433", marginTop:4 }}>
          {/* confidence selector */}
          <div style={{ marginTop:12, marginBottom:10 }}>
            <div style={{ fontSize:11, color:"#4B5563", fontWeight:600, marginBottom:6 }}>ระดับความมั่นใจ</div>
            <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
              {CONF.filter(c => c.val > 0).map(c => (
                <button key={c.val} onClick={() => upd({ confidence: c.val })}
                  style={{ padding:"4px 10px", borderRadius:99, fontSize:12, cursor:"pointer", fontFamily:"inherit",
                    border: `1px solid ${(s.confidence ?? 0) === c.val ? c.color : "#1C2433"}`,
                    background: (s.confidence ?? 0) === c.val ? c.bg : "transparent",
                    color: (s.confidence ?? 0) === c.val ? c.color : "#4B5563" }}>
                  {c.label}
                </button>
              ))}
            </div>
          </div>

          {/* self-assessment rubric */}
          <div style={{ marginBottom:10 }}>
            <div style={{ fontSize:11, color:"#4B5563", fontWeight:600, marginBottom:6 }}>Self-assessment (1–4)</div>
            <div style={{ display:"flex", gap:6 }}>
              {RUBRIC.map(r => (
                <button key={r.val} onClick={() => upd({ rubric: r.val })}
                  style={{ flex:1, padding:"6px 4px", borderRadius:8, fontSize:13, fontWeight:700, cursor:"pointer",
                    fontFamily:"inherit", border:`1px solid ${(s.rubric ?? 0) === r.val ? r.color : "#1C2433"}`,
                    background: (s.rubric ?? 0) === r.val ? r.color + "22" : "transparent",
                    color: (s.rubric ?? 0) === r.val ? r.color : "#374151" }}>
                  {r.val}
                </button>
              ))}
            </div>
            {s.rubric > 0 && (
              <div style={{ fontSize:11, color: RUBRIC[s.rubric-1].color, marginTop:5 }}>
                {RUBRIC[s.rubric-1].label}
              </div>
            )}
          </div>

          {/* evidence log button */}
          <div style={{ display:"flex", gap:8, alignItems:"center", marginBottom:10 }}>
            <button onClick={addEvidence}
              style={{ padding:"6px 14px", borderRadius:8, border:"1px solid #1C2433", background:"#161D27",
                color:"#60A5FA", fontSize:12, cursor:"pointer", fontFamily:"inherit" }}>
              + บันทึก 1 ครั้ง
            </button>
            {(s.evidenceCount || 0) > 0 && (
              <button onClick={() => upd({ evidenceCount: Math.max(0, (s.evidenceCount||0) - 1) })}
                style={{ padding:"6px 10px", borderRadius:8, border:"1px solid #1C2433", background:"none",
                  color:"#374151", fontSize:12, cursor:"pointer", fontFamily:"inherit" }}>
                −
              </button>
            )}
            <span style={{ fontSize:12, color:"#374151" }}>รวม {s.evidenceCount || 0} ครั้ง</span>
          </div>

          {/* note */}
          <div style={{ fontSize:11, color:"#4B5563", fontWeight:600, marginBottom:4 }}>หมายเหตุ / บริบท</div>
          <textarea value={s.note || ""} onChange={e => upd({ note: e.target.value })}
            placeholder="เช่น ทำที่ OPD กับ อ.สมใจ / counseling ยาเบาหวาน…"
            style={{ ...S.inp, height:60, resize:"vertical", fontSize:12 }} />
        </div>
      )}
    </div>
  );
}

function SecSkills({ data, update }) {
  const [ns,      setNs]      = useState({ name:"", cat:"" });
  const [addOpen, setAddOpen] = useState(false);
  const [filter,  setFilter]  = useState("all"); // all | pending | done

  const cats   = [...new Set(data.skills.map(s => s.cat))];
  const total  = data.skills.length;
  const done   = data.skills.filter(s => s.done).length;
  const pct    = Math.round(done / total * 100) || 0;

  // confidence distribution
  const confDist = [1,2,3].map(v => data.skills.filter(s => (s.confidence||0) === v).length);
  // avg rubric of assessed skills
  const assessed = data.skills.filter(s => s.rubric > 0);
  const avgRubric = assessed.length ? (assessed.reduce((a,s) => a + s.rubric, 0) / assessed.length).toFixed(1) : null;
  // total evidence
  const totalEvidence = data.skills.reduce((a, s) => a + (s.evidenceCount || 0), 0);

  const visibleSkills = (cat) => data.skills.filter(s => {
    if (s.cat !== cat) return false;
    if (filter === "done")    return s.done;
    if (filter === "pending") return !s.done;
    return true;
  });

  return (
    <div>
      {/* summary stats */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:14 }}>
        <MStat icon="✅" label="ผ่านแล้ว"    val={`${done}/${total}`} />
        <MStat icon="📝" label="Evidence"     val={totalEvidence} />
        {avgRubric && <MStat icon="⭐" label="Avg self-score" val={avgRubric} color="#FBBF24" />}
      </div>

      {/* overall progress */}
      <Card title={`🎓 Competency Progress · ${pct}%`}>
        <div style={{ background:"#1C2433", borderRadius:99, height:12, marginBottom:12, overflow:"hidden" }}>
          <div style={{ width:`${pct}%`, height:"100%", background:"linear-gradient(90deg,#34D399,#60A5FA)",
            borderRadius:99, transition:"width .5s" }} />
        </div>

        {/* confidence breakdown */}
        <div style={{ display:"flex", gap:6, marginBottom:4 }}>
          {[["🟡","พอรู้",confDist[0],"#FBBF24"],["🟠","ทำได้",confDist[1],"#F97316"],["🟢","ชำนาญ",confDist[2],"#34D399"]].map(([icon,l,n,c]) => (
            <div key={l} style={{ flex:1, textAlign:"center", background: c+"15", borderRadius:8, padding:"6px 4px", border:`1px solid ${c}30` }}>
              <div style={{ fontSize:16 }}>{icon}</div>
              <div style={{ fontSize:13, fontWeight:700, color:c, fontFamily:"IBM Plex Mono" }}>{n}</div>
              <div style={{ fontSize:10, color:"#4B5563" }}>{l}</div>
            </div>
          ))}
        </div>
      </Card>

      {/* filter */}
      <div style={{ display:"flex", gap:6, marginBottom:12 }}>
        {[["all","ทั้งหมด"],["pending","ยังไม่ผ่าน"],["done","ผ่านแล้ว"]].map(([v,l]) => (
          <button key={v} onClick={() => setFilter(v)}
            style={{ padding:"5px 12px", borderRadius:99, fontSize:12, cursor:"pointer", fontFamily:"inherit",
              border:`1px solid ${filter===v ? "#34D399" : "#1C2433"}`,
              background: filter===v ? "#34D39920" : "transparent",
              color: filter===v ? "#34D399" : "#4B5563" }}>
            {l}
          </button>
        ))}
      </div>

      {/* skill list by category */}
      {cats.map(cat => {
        const items = visibleSkills(cat);
        if (items.length === 0) return null;
        const catDone = data.skills.filter(s => s.cat===cat && s.done).length;
        const catTotal = data.skills.filter(s => s.cat===cat).length;
        return (
          <div key={cat} style={{ marginBottom:16 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
              <div style={{ fontSize:11, color:"#4B5563", fontWeight:700, textTransform:"uppercase", letterSpacing:1 }}>{cat}</div>
              <span style={{ fontSize:11, color:"#34D399", fontFamily:"IBM Plex Mono" }}>{catDone}/{catTotal}</span>
            </div>
            {items.map(s => (
              <SkillCard key={s.id} s={s} update={update} />
            ))}
          </div>
        );
      })}

      {/* add skill */}
      <button onClick={() => setAddOpen(o => !o)}
        style={{ ...S.primBtn, fontFamily:"inherit", cursor:"pointer" }}>
        {addOpen ? "ยกเลิก" : "+ เพิ่ม Skill"}
      </button>
      {addOpen && (
        <Card title="+ เพิ่ม Skill">
          <FL label="Category"><input value={ns.cat}  onChange={e => setNs(s => ({...s,cat:e.target.value}))}  placeholder="หมวด" style={S.inp} /></FL>
          <FL label="Skill">   <input value={ns.name} onChange={e => setNs(s => ({...s,name:e.target.value}))} placeholder="ชื่อ skill" style={S.inp} /></FL>
          <Btn onClick={() => {
            if (!ns.name.trim() || !ns.cat.trim()) return;
            update(d => { d.skills.push({ ...ns, id:Date.now(), done:false, confidence:0, rubric:0, evidenceCount:0, note:"" }); return d; });
            setNs({ name:"", cat:"" });
            setAddOpen(false);
          }} sx={S.primBtn}>เพิ่ม</Btn>
        </Card>
      )}
    </div>
  );
}

function fmtTHshort(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr + "T00:00:00");
  const M = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
  return `${d.getDate()} ${M[d.getMonth()]}`;
}

function SecSettings({ data, update }) {
  const [local, setLocal] = useState(data.settings);
  return (
    <div>
      <Card title="⚙️ ตั้งค่า">
        {[["name","ชื่อของคุณ"],["site","แหล่งฝึกงาน"]].map(([k,l]) => (
          <FL key={k} label={l}><input value={local[k]} onChange={e => setLocal(s => ({...s,[k]:e.target.value}))} style={S.inp} /></FL>
        ))}
        <FL label="วันเริ่มฝึกงาน">
          <input type="date" value={local.startDate} onChange={e => setLocal(s => ({...s,startDate:e.target.value}))} style={S.inp} />
        </FL>
        <Btn onClick={() => update(d => { d.settings = local; return d; })} sx={S.primBtn}>บันทึก</Btn>
      </Card>
      <Card title="🗄️ ข้อมูล">
        <p style={{fontSize:13,color:"#4B5563",marginBottom:12,lineHeight:1.7}}>
          ข้อมูลเก็บใน browser ของคุณ ไม่ได้ส่งออก แนะนำ export สำรองไว้
        </p>
        <Btn onClick={() => {
          const b = new Blob([JSON.stringify(persist.load(), null, 2)], { type:"application/json" });
          const a = document.createElement("a");
          a.href = URL.createObjectURL(b);
          a.download = `pharmintern_${todayStr()}.json`;
          a.click();
        }} sx={{...S.ghostBtn,width:"100%",textAlign:"center"}}>📥 Export Backup (JSON)</Btn>
      </Card>
    </div>
  );
}

// ─── SHARED UI ────────────────────────────────────────────────────
function SiteBanner({ site }) {
  return (
    <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderRadius:10,marginBottom:12,
      background:site.bg, border:`1px solid ${site.color}30`}}>
      <span style={{fontSize:18}}>{site.icon}</span>
      <span style={{fontSize:12,fontWeight:700,color:site.color}}>{site.label}</span>
    </div>
  );
}
function Card({ title, children }) {
  return (
    <div style={S.card}>
      {title && <div style={S.cardT}>{title}</div>}
      {children}
    </div>
  );
}
function FL({ label, children }) {
  return <div style={{marginBottom:10}}><div style={{fontSize:11,color:"#4B5563",marginBottom:4,fontWeight:600}}>{label}</div>{children}</div>;
}
function InRow({ value, onChange, ph, onAdd }) {
  return (
    <div style={{display:"flex",gap:6,marginBottom:10}}>
      <input value={value} onChange={e => onChange(e.target.value)} onKeyDown={e => { if (e.key==="Enter") onAdd(); }} placeholder={ph} style={{...S.inp,flex:1}} />
      <button onClick={onAdd} style={S.addBtn}>+</button>
    </div>
  );
}
function Row2({ children, style }) {
  return <div style={{display:"flex",gap:8,...style}}>{children}</div>;
}
function Chip({ on, onClick, children, color }) {
  const c = color || "#34D399";
  return (
    <button onClick={onClick} style={{ padding:"4px 10px", borderRadius:99, fontSize:12, cursor:"pointer",
      border:`1px solid ${on ? c : "#1C2433"}`, fontFamily:"inherit",
      background: on ? c+"22" : "transparent", color: on ? c : "#4B5563", transition:"all .15s" }}>
      {children}
    </button>
  );
}
function MStat({ icon, label, val, color }) {
  return (
    <div style={{...S.card,textAlign:"center",padding:"12px 8px"}}>
      <div style={{fontSize:22,marginBottom:3}}>{icon}</div>
      <div style={{fontSize:17,fontWeight:700,color:color||"#F3F4F6",fontFamily:"IBM Plex Mono"}}>{val}</div>
      <div style={{fontSize:10,color:"#374151",marginTop:2}}>{label}</div>
    </div>
  );
}
function QBadge({ s }) {
  const MAP = { pending:["⏳","#FBBF24"], accepted:["✅","#34D399"], retry:["🔄","#60A5FA"], rejected:["❌","#F87171"] };
  const [icon, c] = MAP[s] || ["?","#6B7280"];
  return <span style={{fontSize:12,color:c,background:c+"22",padding:"3px 8px",borderRadius:99,whiteSpace:"nowrap"}}>{icon} {s}</span>;
}
function Badge({ children, style }) {
  return <span style={{fontSize:11,background:"#1C2433",color:"#6B7280",padding:"3px 8px",borderRadius:99,display:"inline-block",...style}}>{children}</span>;
}
function KV({ k, v, color }) {
  return <div style={{marginBottom:5}}><span style={{fontSize:11,color:"#374151"}}>{k}: </span><span style={{fontSize:13,color:color||"#D1D5DB"}}>{v}</span></div>;
}
function XBtn({ onClick }) {
  return <button onClick={onClick} style={{background:"none",border:"none",color:"#374151",cursor:"pointer",fontSize:18,padding:"0 2px",flexShrink:0}}>×</button>;
}
function RedBtn({ onClick, children, style }) {
  return <button onClick={onClick} style={{padding:"6px 12px",background:"none",border:"1px solid #3D1515",borderRadius:8,color:"#EF4444",cursor:"pointer",fontFamily:"inherit",fontSize:12,...style}}>{children}</button>;
}
function Muted({ children }) {
  return <div style={{color:"#2D3748",fontSize:13,textAlign:"center",padding:"20px 0"}}>{children}</div>;
}
function Btn({ onClick, sx, children }) {
  return <button onClick={onClick} style={{...sx,fontFamily:"inherit",cursor:"pointer"}}>{children}</button>;
}

// ─── UTILS ───────────────────────────────────────────────────────
function fmtTH(dateStr) {
